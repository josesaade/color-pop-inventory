<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Color Pop</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0a0a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Color Pop">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=Syne:wght@700;800&display=swap');
  *{margin:0;padding:0;box-sizing:border-box;}
  :root{
    --bg:#0a0a0a;--surface:#111;--border:#222;
    --text:#f0ede8;--text2:#888;
    --font-display:'Syne',sans-serif;
    --font-mono:'DM Mono',monospace;
  }
  html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-mono);-webkit-font-smoothing:antialiased;overflow:hidden;}
  .app{height:100dvh;display:flex;flex-direction:column;padding:env(safe-area-inset-top,0) 0 env(safe-area-inset-bottom,0);}
  header{padding:20px 24px 12px;display:flex;align-items:baseline;gap:12px;flex-shrink:0;}
  .header-title{font-family:var(--font-display);font-size:22px;font-weight:800;letter-spacing:-0.02em;}
  .header-sub{font-size:11px;color:var(--text2);letter-spacing:0.08em;text-transform:uppercase;}
  .sync-dot{width:6px;height:6px;border-radius:50%;background:#444;margin-left:auto;flex-shrink:0;transition:background 0.3s;}
  .sync-dot.ok{background:#2d9c5e;}
  .sync-dot.err{background:#c0392b;}
  .grid{flex:1;overflow-y:auto;padding:8px 16px 24px;display:grid;grid-template-columns:1fr 1fr;gap:10px;align-content:start;}
  .card{border-radius:16px;padding:18px 16px 16px;position:relative;overflow:hidden;cursor:default;transition:transform 0.15s,opacity 0.15s;min-height:110px;display:flex;flex-direction:column;justify-content:space-between;animation:fadeUp 0.4s both;}
  .card:active{transform:scale(0.97);}
  .card-bg{position:absolute;inset:0;opacity:0.15;background:var(--c);}
  .card-border{position:absolute;inset:0;border-radius:16px;border:1px solid var(--c);opacity:0.3;}
  .card-top{display:flex;align-items:flex-start;justify-content:space-between;position:relative;}
  .card-count{font-family:var(--font-display);font-size:42px;font-weight:800;line-height:1;color:var(--c);}
  .card-total{font-size:10px;color:var(--text2);letter-spacing:0.06em;margin-top:6px;text-align:right;}
  .card-name{font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:-0.01em;position:relative;line-height:1.2;}
  .card-label{font-size:10px;color:var(--text2);letter-spacing:0.06em;margin-top:2px;position:relative;}
  .bar-wrap{margin-top:10px;height:3px;background:#222;border-radius:2px;overflow:hidden;position:relative;}
  .bar-fill{height:100%;border-radius:2px;background:var(--c);transition:width 0.8s cubic-bezier(0.16,1,0.3,1);}
  .zero .card-count{opacity:0.25;}
  .zero .card-name{opacity:0.4;}
  .loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:var(--bg);z-index:10;transition:opacity 0.4s;}
  .loading.hide{opacity:0;pointer-events:none;}
  .loading-text{font-size:12px;color:var(--text2);letter-spacing:0.1em;text-transform:uppercase;}
  .spinner{width:24px;height:24px;border:2px solid #222;border-top-color:#555;border-radius:50%;animation:spin 0.8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .total-bar{padding:12px 24px;display:flex;align-items:center;gap:12px;flex-shrink:0;border-top:1px solid var(--border);}
  .total-label{font-size:11px;color:var(--text2);letter-spacing:0.06em;text-transform:uppercase;}
  .total-val{font-family:var(--font-display);font-size:18px;font-weight:800;margin-left:auto;}
  .total-sub{font-size:11px;color:var(--text2);}
  @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div>
      <div class="header-title">COLOR POP</div>
      <div class="header-sub">disponibles por enfoque</div>
    </div>
    <div class="sync-dot" id="sync-dot"></div>
  </header>
  <div class="grid" id="grid"></div>
  <div class="total-bar" id="total-bar" style="display:none;">
    <span class="total-label">disponibles</span>
    <span class="total-sub" id="total-sub"></span>
    <span class="total-val" id="total-val"></span>
  </div>
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <div class="loading-text">cargando</div>
  </div>
</div>
<script>
const SB_URL='https://uytbnqvmgalycxqnhdzb.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InV5dGJucXZtZ2FseWN4cW5oZHpiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA5MjI0MzcsImV4cCI6MjA5NjQ5ODQzN30._6AtcAcpMqlhMAcU5rSP-UAq77k7n6hrhN2NgE49izY';
const ENFOQUES={
  "Silver Chariot":{color:"#9E9E9E",label:"escala de grises"},
  "Lost in Paradise":{color:"#C4A882",label:"beige y arena"},
  "Stone Ocean":{color:"#4A90C4",label:"azules"},
  "Emerald Splash":{color:"#639922",label:"verde"},
  "Red Bebop":{color:"#8B1A1A",label:"rojo y vinotinto"},
  "Overtime":{color:"#7F77DD",label:"beige con azul"},
  "Kurozaki Boy":{color:"#E07B2A",label:"naranja"},
  "Bites The Dust":{color:"#E8A0B4",label:"rosado"},
  "Black & White":{color:"#2C2C2A",label:"blanco y negro"},
  "Golden Spin":{color:"#8B6914",label:"cafés"},
  "Jet Black":{color:"#111111",label:"negro"},
  "Hermit Purple":{color:"#9B59B6",label:"violeta y lila"}
};
async function load(){
  const dot=document.getElementById('sync-dot');
  try{
    const r=await fetch(`${SB_URL}/rest/v1/outfits_state?key=eq.state&select=value`,{
      headers:{'apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY}
    });
    if(!r.ok) throw new Error('fetch failed');
    const d=await r.json();
    if(!d.length) throw new Error('no data');
    const state=JSON.parse(d[0].value);
    dot.className='sync-dot ok';
    render(state.outfits||[]);
  }catch(e){
    dot.className='sync-dot err';
    try{
      const local=JSON.parse(localStorage.getItem('outfit_state')||'null');
      if(local) render(local.outfits||[]);
      else showError();
    }catch(_){showError();}
  }
  document.getElementById('loading').classList.add('hide');
}
function render(outfits){
  const disp={},total={};
  Object.keys(ENFOQUES).forEach(e=>{disp[e]=0;total[e]=0;});
  outfits.forEach(o=>{
    if(!ENFOQUES[o.e]) return;
    total[o.e]=(total[o.e]||0)+1;
    if(!o.usado) disp[o.e]=(disp[o.e]||0)+1;
  });
  const totalDisp=Object.values(disp).reduce((a,b)=>a+b,0);
  const totalAll=outfits.length;
  const sorted=Object.keys(ENFOQUES).sort((a,b)=>disp[b]-disp[a]);
  const grid=document.getElementById('grid');
  grid.innerHTML=sorted.map((e,i)=>{
    const c=ENFOQUES[e].color;
    const d=disp[e]||0;
    const t=total[e]||0;
    const pct=t>0?Math.round((d/t)*100):0;
    return`<div class="card${d===0?' zero':''}" style="--c:${c};animation-delay:${i*0.04}s">
      <div class="card-bg"></div>
      <div class="card-border"></div>
      <div class="card-top">
        <div class="card-count">${d}</div>
        <div class="card-total">${t} total<br>${pct}%</div>
      </div>
      <div>
        <div class="card-name">${e}</div>
        <div class="card-label">${ENFOQUES[e].label}</div>
        <div class="bar-wrap">
          <div class="bar-fill" style="width:${pct}%"></div>
        </div>
      </div>
    </div>`;
  }).join('');
  const totalBar=document.getElementById('total-bar');
  totalBar.style.display='flex';
  document.getElementById('total-val').textContent=totalDisp;
  document.getElementById('total-sub').textContent=`de ${totalAll} outfits`;
}
function showError(){
  document.getElementById('grid').innerHTML=`
    <div style="grid-column:1/-1;text-align:center;color:#555;padding:40px 0;font-size:12px;letter-spacing:0.1em;text-transform:uppercase;">
      sin conexión
    </div>`;
}
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('/sw.js');
  });
}
load();
</script>
</body>
</html>
